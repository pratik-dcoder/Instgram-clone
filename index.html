<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Clone</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#fafafa;
}

header{
    background:white;
    border-bottom:1px solid #ddd;
    padding:15px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

.stories{
    display:flex;
    gap:15px;
    overflow-x:auto;
    padding:15px;
    background:white;
    margin-bottom:20px;
}

.story{
    text-align:center;
}

.story img{
    width:70px;
    height:70px;
    border-radius:50%;
    border:3px solid #ff0066;
}

.post{
    background:white;
    max-width:500px;
    margin:20px auto;
    border:1px solid #ddd;
}

.post-header{
    padding:12px;
    font-weight:bold;
}

.post img{
    width:100%;
}

.actions{
    padding:10px;
}

button{
    border:none;
    background:none;
    font-size:24px;
    cursor:pointer;
}

.likes{
    font-weight:bold;
    margin-top:5px;
}

.comments{
    padding:10px;
}

input{
    width:80%;
    padding:8px;
}

.comment-btn{
    font-size:14px;
    color:blue;
}
</style>
</head>
<body>

<header>Instagram</header>

<div class="stories">
    <div class="story">
        <img src="https://picsum.photos/100?1">
        <p>You</p>
    </div>
    <div class="story">
        <img src="https://picsum.photos/100?2">
        <p>Alex</p>
    </div>
    <div class="story">
        <img src="https://picsum.photos/100?3">
        <p>John</p>
    </div>
</div>

<div class="post">
    <div class="post-header">pratik_dev</div>

    <img src="https://picsum.photos/600/400">

    <div class="actions">
        <button onclick="likePost()">❤️</button>
        <div class="likes" id="likes">0 likes</div>
    </div>

    <div class="comments">
        <div id="commentList"></div>

        <input type="text" id="commentInput"
        placeholder="Add a comment...">

        <button class="comment-btn"
        onclick="addComment()">Post</button>
    </div>
</div>

<script>
let count = 0;

function likePost(){
    count++;
    document.getElementById("likes").innerText =
    count + " likes";
}

function addComment(){
    let input =
    document.getElementById("commentInput");

    let text = input.value.trim();

    if(text==="") return;

    let p = document.createElement("p");
    p.innerHTML="<b>user:</b> "+text;

    document.getElementById("commentList")
    .appendChild(p);

    input.value="";
}
</script>

</body>
</html>
